[package]
name = "epkg"
description = "epkg package manager"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.0", features = ["derive"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
walkdir = "2.3"
tar = "0.4"
zstd = "0.11"
sha2 = "0.10" 
base32 = "0.5.1" 
glob = "0.3.2"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
toml = "0.7"
grep = "0.2"
dirs = "5.0"
openssl = { version = "0.10", features = ["vendored"] }
