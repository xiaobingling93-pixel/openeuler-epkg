format: deb
distro: ubuntu
distro_dirs: # longer first
- releases.ubuntu.com/ubuntu
- archive.ubuntu.com/ubuntu
- ubuntu-mirror/ubuntu
- ubuntu-mirror/archive
- archive.ubuntu.com
- ubuntu/ubuntu-archive
- ubuntu/ubuntu
- debian/ubuntu
- ubuntu.com
- ubuntu-ports
- ubuntu-mirror
- ubuntu-packages
- ubuntu/packages
- ubuntu-archive
- ubuntu/archive
- ubuntuarchive
- ubuntu
- Ubuntu
version: noble  # it's available in all ubuntu-*.yaml repos
versions: # first column is formal version string, others are aliases
- questing  25.10
- resolute  26.04
- plucky    25.04
- noble     24.04
- mantic    23.10
- lunar     23.04
- jammy     22.04
- kinetic   22.10
- focal     20.04

# DEB specific rule for 'repos' field:
# - shall contain
#   - 1 item for the official repo, use "Official" key
#   - 1 item for all other (3rd party) repos
# - serves as prefix when composing repodata_name, so
# - shall have unique values to avoid conflicts in dir layout get_repo_dir()
repos:
  Official:

# DEB specific 'components' field:
# - if empty: enable all components in the Release file
# - else: select only the listed ones
components:
# - main
# - universe
# - restricted
# - multiverse

index_url:          $mirror/dists/$version/Release
amend_index_urls:
  updates:          $mirror/dists/$version-updates/Release
  security:         $mirror/dists/$version-security/Release

# Packages url:
# - ubuntu/dists/{version}/{repo}/binary-{arch}/Packages.xz
# - ubuntu/dists/{version}-updates/{repo}/binary-{arch}/Packages.xz
# - ubuntu/dists/{version}-security/{repo}/binary-{arch}/Packages.xz
#
# Example URLs:
# http://ports.ubuntu.com/ubuntu-ports/dists/noble/main/binary-arm64/Packages.xz
# http://ports.ubuntu.com/ubuntu-ports/dists/noble/Contents-arm64.gz
