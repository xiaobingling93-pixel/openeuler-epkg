# Global mirrors that host multiple distributions
huawei:
  name: "Huawei Cloud Mirror"
  url: "https://mirrors.huaweicloud.com"
  priority: 10
  supports:
    - debian
    - ubuntu
    - fedora
    - opensuse
    - openeuler
    - rocky
    - almalinux
    - alpine

tsinghua:
  name: "Tsinghua University Mirror"
  url: "https://mirrors.tuna.tsinghua.edu.cn"
  priority: 20
  supports:
    - debian
    - ubuntu
    - fedora
    - opensuse
    - openeuler
    - rocky
    - almalinux
    - archlinux
    - alpine

ustc:
  name: "USTC Mirror"
  url: "https://mirrors.ustc.edu.cn"
  priority: 30
  supports:
    - debian
    - ubuntu
    - fedora
    - opensuse
    - openeuler
    - archlinux
    - alpine

rackspace:
  name: "Rackspace Mirror"
  url: "https://mirror.rackspace.com"
  priority: 40
