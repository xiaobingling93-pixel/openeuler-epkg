format: deb
distro: ubuntu
distro_dirs: # longer first
- archive.ubuntu.com/ubuntu
- archive.ubuntu.com
- ubuntu/ubuntu-archive
- ubuntu/ubuntu
- debian/ubuntu
- ubuntu.com
- ubuntu-ports
- ubuntu-mirror
- ubuntu-packages
- ubuntu/packages
- ubuntu-archive
- ubuntu/archive
- ubuntuarchive
- releases.ubuntu.com/ubuntu
- ubuntu
version: noble
versions: # First value is official, others are aliases
- noble   24.04
- mantic  23.10
- lunar   23.04
- jammy   22.04
- kinetic 22.10
- focal   20.04
repos:
  main:
  universe:
  restricted:
  multiverse:
index_url:          $mirror/dists/$version/Release
index_url_updates:  $mirror/dists/$version-updates/Release
index_url_security: $mirror/dists/$version-security/Release

# Packages url:
# - ubuntu/dists/{version}/{repo}/binary-{arch}/Packages.xz
# - ubuntu/dists/{version}-updates/{repo}/binary-{arch}/Packages.xz
# - ubuntu/dists/{version}-security/{repo}/binary-{arch}/Packages.xz
#
# Example URLs:
# http://ports.ubuntu.com/ubuntu-ports/dists/noble/main/binary-arm64/Packages.xz
# http://ports.ubuntu.com/ubuntu-ports/dists/noble/Contents-arm64.gz
