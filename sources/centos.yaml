# CentOS Configuration
format: rpm
distro: centos
distro_dirs:
- centos-stream-all
- centos_stream_all
- CentOS-Stream-All
- centos-stream
- centosstream
- CentOS-stream

versions:
  - "10-stream"
  - "9-stream"
  - "8-stream"
  - "8"
  - "7"
repos:
  BaseOS:
  AppStream:

# Example: https://mirror.stream.centos.org/10-stream/AppStream/aarch64/os/repodata/repomd.xml
index_url: $mirror/$version/$repo/$arch/os/repodata/repomd.xml
