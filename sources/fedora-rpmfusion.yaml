format: rpm
distro: fedora
distro_dirs:
- download1.rpmfusion.org
- rpmfusion.org
- rpmfusion
versions:
- "42"
- "41"
- "40"
- "39"
repos:
  rpmfusion:
index_url: $mirror/free/fedora/releases/$version/Everything/$arch/os/repodata/repomd.xml
amend_index_urls:
  updates: $mirror/free/fedora/updates/$version/$arch/repodata/repomd.xml
  nonfree:         $mirror/nonfree/fedora/releases/$version/Everything/$arch/os/repodata/repomd.xml
  nonfree-updates: $mirror/nonfree/fedora/updates/$version/$arch/repodata/repomd.xml

