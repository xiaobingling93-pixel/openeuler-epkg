format: rpm
distro: fedora
version:  # default to versions[0]
versions:
- "43"
- "42"
- "41"
- "40"
- "39"
- "38"
distro_dirs:
- archive.fedoraproject.org/pub/fedora/linux
- download.fedora.redhat.com/pub/fedora/linux
- dl.fedoraproject.org/pub/fedora/linux
- fedoraproject.org/fedora/linux
- fedora-projects/fedora-secondary
- fedora-projects/fedora/linux
- fedora.redhat.com/linux
- Fedora/fedora/linux
- fedora/fedora/linux
- fedora/fedora
- fedora/linux
- fedora/fedora-secondary
- fedora-linux/fedora-secondary
- fedora-linux/fedora/linux
- fedora-linux
- fedora-secondary # Common suffix for secondary archs: AArch64 (ARM64), ARMhfp (ARM 32-bit), PowerPC (ppc64le), s390x
- Fedora
- fedora
repos:
  Everything:
index_url:         $mirror/releases/$version/$repo/$arch/os/repodata/repomd.xml
amend_index_urls:
  updates: $mirror/updates/$version/$repo/$arch/repodata/repomd.xml

