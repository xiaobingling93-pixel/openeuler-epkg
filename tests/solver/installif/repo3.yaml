- pkgname: qt5-qtbase
  version: 1
  provides:
    - so:libQt5Core.so.5 = 1.0
    - qt5-qtbase = 1
    - qt5-qtbase(x86-64) = 1

- pkgname: wayland-libs-client
  version: 1
  provides:
    - so:libwayland-client.so.0 = 1.0
    - wayland-libs-client = 1
    - wayland-libs-client(x86-64) = 1

- pkgname: peruse
  version: 1
  requires:
    - so:libQt5Core.so.5
  provides:
    - peruse = 1
    - peruse(x86-64) = 1

- pkgname: sway
  version: 1
  requires:
    - so:libwayland-client.so.0
  provides:
    - sway = 1
    - sway(x86-64) = 1

- pkgname: qt5-qtwayland
  version: 1
  # install-if: wayland-libs-client and qt5-qtbase
  provides:
    - qt5-qtwayland = 1
    - qt5-qtwayland(x86-64) = 1

